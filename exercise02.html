    <h1> Gửi em cô gái của anh</h1>

        Giấu trong đó chút bồng bềnh gió sương<br>
Vài lời chẳng thể thành thương<br>
Chạm vào ánh mắt vấn vương nhớ người<br>
<br>
Muốn gửi em chút ngọt ngào<br>
Như hoa sương sớm , như màu nắng nghiêng<br>
Đường dài chẳng hẹn ước duyên<br>
Nhưng tay anh vẫn để yên chờ người<br>
</p>
