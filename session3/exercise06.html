<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tạo table sử dụng thuộc tính colspan</title>
</head>
<body>
    <table border="1" Cellpadding="10">
<tr>
    <th>Loại sản phẩm</th>
    <th>Tên sản phẩm </th>
    <th>Giá </th>
   
</tr>
<Tr>
    <td rowspan="2">Điện tử</td>
    <td>laptop</td>
    <td>15.000.000</td>
</Tr>
<Tr>
    <td>Điện thoại</td>
    <td>80.000.000</td>
</Tr>
<Tr>
    <td>Gia dụng</td>
    <td>Máy giặt</td>
    <td>5.000.000</td>
</Tr>
    </table>
</body>
</html>
