<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Liên hệ</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 40px;
        }

        .form-box {
            width: 450px;
            border: 1px solid #ccc;
            padding: 20px;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        label {
            font-size: 18px;
            display: block;      
            margin-bottom: 6px;
        }

        input[type="text"],
        input[type="email"],
        textarea {
            width: 100%;
            padding: 8px;
            font-size: 16px;
            margin-bottom: 15px;
        }

        textarea {
            height: 120px;
        }

        button {
            padding: 8px 20px;
            font-size: 16px;
        }
    </style>
</head>

<body>

    <div class="form-box">
        <h2>Liên Hệ Với Chúng Tôi</h2>

        <form>
            <label>Họ và tên:</label>
            <input type="text" placeholder="Nhập họ và tên">

            <label>Email:</label>
            <input type="email" placeholder="Nhập email">

            <label>Tin nhắn:</label>
            <textarea placeholder="Nhập nội dung tin nhắn"></textarea>

            <button type="submit">Gửi</button>
        </form>
    </div>

</body>
</html>
