    <label for="name">Name:</label>

<form action="">
    <label for="name">Name:</label>

    <br>
    <label for="email">Email:</label>
    <input style="margin-bottom: 10px;" type="email" id="email" name="email">

    <label for="phone">Phone:</label>

    </select>
    <br>
    <label for ="quantity">Quantity:</label>
